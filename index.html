<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tours and Travelling</title>
  <style>
    body {
      background-color: #f0f0f0;
      color: #333;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #007bff;
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    input[type="text"], input[type="submit"] {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    input[type="submit"] {
      background-color: #007bff;
      color: #fff;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #0056b3;
    }
    #weatherInfo {
      font-weight: bold;
      color: #007bff;
      margin-top: 5px;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Save and View Passenger Data</h1>

    <label for="passengerid">Passenger ID:</label>
    <input type="text" id="passengerid">

    <label for="name">Name:</label>
    <input type="text" id="name">

    <label for="source">Source:</label>
    <input type="text" id="source">

    <label for="destination">Destination:</label>
    <input type="text" id="destination" placeholder="Enter destination city">

    <p id="weatherInfo"></p>

    <input type="submit" id="savepassenger" value="Save Passenger Data">
    <p id="passengersaved"></p>

    <input type="submit" id="getpassengers" value="View All Passengers">

    <div id="showpassengers">
      <table id="passengerTable">
        <thead>
          <tr>
            <th>Passenger ID</th>
            <th>Name</th>
            <th>Source</th>
            <th>Destination</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.6.0/jquery.min.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
